<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaxFlow - Quadro de Planejamento & Prioridades</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    /* Transições de tema global */
    * {
      transition-property: background-color, border-color, color, fill, stroke;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 200ms;
    }
    body {
      background-color: #f8fafc;
    }
    html.dark body {
      background-color: #0b0f19;
    }

    /* Animação para cards */
    @keyframes fadeInCard {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-card-in {
      animation: fadeInCard 0.25s ease-out forwards;
    }

    /* Scrollbars customizadas */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9px;
    }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Efeito de arraste do SortableJS */
    .sortable-ghost {
      opacity: 0.25;
      background-color: rgba(79, 70, 229, 0.15) !important;
      border: 2px dashed #4f46e5 !important;
    }
    .sortable-drag {
      transform: rotate(2deg);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15), 0 8px 10px -6px rgb(0 0 0 / 0.15) !important;
    }
  </style>
</head>

<body class="text-slate-800 dark:text-slate-200 antialiased min-h-screen flex flex-col font-sans transition-colors duration-200">

  <!-- Container Principal -->
  <div id="todo-app" class="flex-1 flex flex-col min-h-screen"></div>

  <!-- Script Principal de Lógica -->
  <script type="module" src="/src/todo.ts"></script>
</body>

</html>
